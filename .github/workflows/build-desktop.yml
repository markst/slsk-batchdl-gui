name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: sldl-web-windows
          - os: macos-latest
            target: osx
            artifact: sldl-web-macos
          - os: macos-latest
            target: osx-arm64
            artifact: sldl-web-macos-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install electronize CLI
        run: dotnet tool install ElectronNET.CLI -g

      - name: Restore dependencies
        run: dotnet restore app/SldlWeb.csproj

      - name: Build Electron app (Windows)
        if: matrix.target == 'win'
        working-directory: app
        run: electronize build /target win /dotnet-configuration Release /electron-arch x64

      - name: Build Electron app (macOS x64)
        if: matrix.target == 'osx'
        working-directory: app
        run: electronize build /target osx /dotnet-configuration Release /electron-arch x64

      - name: Build Electron app (macOS arm64)
        if: matrix.target == 'osx-arm64'
        working-directory: app
        run: electronize build /target osx /dotnet-configuration Release /electron-arch arm64

      - name: Upload Windows artifact
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: app/bin/Desktop/**/*.exe
          if-no-files-found: error

      - name: Upload macOS artifact
        if: startsWith(matrix.target, 'osx')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: app/bin/Desktop/**/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
